<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Quiz</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .page { display: none; animation: fadeIn 0.4s ease-out forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #mode-modal { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        #mode-modal.active { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <header class="p-6 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-40">
            <h1 class="text-xl font-black italic tracking-tighter">ALPHA.QUIZ</h1>
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
        </header>

        <main class="p-6 pb-32">
            <div id="ad-top" class="w-full min-h-[100px] mb-8 flex justify-center overflow-hidden">
                <script async="async" data-cfasync="false" src="https://pl29408286.profitablecpmratenetwork.com/f15fb563fd2e021ca8982da0d7d8e260/invoke.js"></script>
                <div id="container-f15fb563fd2e021ca8982da0d7d8e260"></div>
            </div>

            <div class="mb-8"><h2 class="text-4xl font-black">Courses</h2></div>
            <div class="grid grid-cols-2 gap-4" id="course-grid"></div>
        </main>
    </div>

    <div id="mode-overlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300">
        <div id="mode-modal" class="fixed bottom-0 left-0 w-full bg-[#111] rounded-t-[2.5rem] p-8 pb-12 border-t border-white/10">
            <div class="w-12 h-1.5 bg-zinc-800 rounded-full mx-auto mb-8"></div>
            <div class="space-y-4">
                <button onclick="setMode('quick')" class="w-full p-5 glass rounded-2xl text-left"><b>Quick Run</b></button>
                <button onclick="setMode('learning')" class="w-full p-5 glass rounded-2xl text-left"><b>Learning Mode</b></button>
                <button onclick="setMode('timer')" class="w-full p-5 glass rounded-2xl text-left"><b>10s Challenge</b></button>
            </div>
            <button onclick="closeModeSelector()" class="w-full mt-6 text-zinc-500 font-bold">Cancel</button>
        </div>
    </div>

    <div id="quiz-page" class="page fixed inset-0 bg-black z-[70] p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <button onclick="location.reload()" class="text-zinc-500 font-bold">Exit</button>
            <div id="timer-display" class="font-mono text-amber-500 font-bold px-4 py-1 glass rounded-full">--:--</div>
        </div>
        <div id="quiz-content">
            <div class="h-1 bg-zinc-900 w-full rounded-full mb-8"><div id="progress-bar" class="h-full bg-white transition-all duration-300"></div></div>
            <h2 id="question-text" class="text-2xl font-bold mb-10 leading-tight"></h2>
            <div id="options-container" class="space-y-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCztdiCYxch4pHpP0Rqu737PHp9LSL4PH0",
            authDomain: "alpha-quiz-46d96.firebaseapp.com",
            projectId: "alpha-quiz-46d96",
            storageBucket: "alpha-quiz-46d96.firebasestorage.app",
            messagingSenderId: "767717782522",
            appId: "1:767717782522:web:5bfd0288fcd5b3031f6a43"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const courses = [
            { id: 'phy102', name: 'PHY 102', color: 'blue' },
            { id: 'chm102', name: 'CHM 102', color: 'emerald' },
            { id: 'mth102', name: 'MTH 102', color: 'purple' },
            { id: 'gst112', name: 'GST 112', color: 'amber' },
            { id: 'bio102', name: 'BIO 102', color: 'red' },
            { id: 'cos', name: 'COS', color: 'zinc' }
        ];

        let currentCourse = '', questions = [], index = 0, score = 0, mode = '', timer;

        const grid = document.getElementById('course-grid');
        courses.forEach(c => {
            grid.innerHTML += `
                <div onclick="openModeSelector('${c.id}')" class="glass p-6 rounded-[2.5rem] aspect-square flex flex-col justify-between active:scale-95 transition-all">
                    <div class="w-10 h-10 rounded-2xl bg-${c.color}-500/20 text-${c.color}-400 flex items-center justify-center font-black">${c.name[0]}</div>
                    <h3 class="font-bold text-lg">${c.name}</h3>
                </div>`;
        });

        window.openModeSelector = (id) => {
            currentCourse = id;
            document.getElementById('mode-overlay').classList.remove('hidden');
            setTimeout(() => { document.getElementById('mode-overlay').classList.add('opacity-100'); document.getElementById('mode-modal').classList.add('active'); }, 10);
        };

        window.closeModeSelector = () => {
            document.getElementById('mode-modal').classList.remove('active');
            document.getElementById('mode-overlay').classList.remove('opacity-100');
            setTimeout(() => document.getElementById('mode-overlay').classList.add('hidden'), 300);
        };

        window.setMode = async (m) => {
            mode = m; closeModeSelector();
            const snap = await getDoc(doc(db, "quizzes", currentCourse));
            if(snap.exists()) { questions = snap.data().questions; startQuiz(); }
        };

        function startQuiz() {
            index = 0; score = 0;
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('quiz-page').classList.add('active');
            renderQuestion();
        }

        function renderQuestion() {
            clearInterval(timer);
            if(index >= questions.length) return finishQuiz();
            const q = questions[index];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('progress-bar').style.width = `${(index / questions.length) * 100}%`;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            if(mode === 'timer') {
                let sec = 10;
                timer = setInterval(() => {
                    sec--; document.getElementById('timer-display').innerText = `00:${sec < 10 ? '0'+sec : sec}`;
                    if(sec <= 0) { clearInterval(timer); checkAnswer(-1); }
                }, 1000);
            }

            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 glass rounded-2xl text-left transition-all active:bg-white active:text-black";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(i, btn) {
            clearInterval(timer);
            const correct = questions[index].correct;
            if(mode === 'learning') {
                const btns = document.querySelectorAll('#options-container button');
                btns.forEach((b, idx) => {
                    if(idx === correct) b.classList.add('!bg-green-500/20', '!text-green-400');
                    if(idx === i && i !== correct) b.classList.add('!bg-red-500/20', '!text-red-400');
                });
                const exp = document.createElement('div');
                exp.className = "p-5 rounded-2xl bg-white/5 mt-6 animate-in fade-in";
                exp.innerHTML = `<p class="text-sm">${questions[index].explanation || 'Correct!'}</p>
                <button onclick="next()" class="w-full mt-6 py-4 bg-white text-black font-bold rounded-xl">Next</button>`;
                document.getElementById('options-container').appendChild(exp);
            } else { if(i === correct) score++; next(); }
        }

        window.next = () => { index++; renderQuestion(); };

        function finishQuiz() {
            document.getElementById('quiz-content').innerHTML = `<div class="text-center pt-20"><h2 class="text-6xl font-black mb-8">${score}/${questions.length}</h2><button onclick="location.reload()" class="px-10 py-4 bg-white text-black font-bold rounded-full">Done</button></div>`;
        }

        // REGISTER SERVICE WORKER
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>

    <script src="https://pl29408287.profitablecpmratenetwork.com/a1/41/66/a141661b1f31ab3d6dcf612d3a35184d.js"></script>
    <script src="https://pl29408288.profitablecpmratenetwork.com/8b/1b/35/8b1b35a2370b329846cba5ec4e2e3bec.js"></script>
</body>
</html>
